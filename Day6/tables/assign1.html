<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 align="center">My Multi Level Table</h1>
    <table border="1" align="center">
        <tr>
            <th rowspan="2" colspan="2">column0</th>
            <th rowspan="2">column1</th>
            <th colspan="2">column2</th>
           
        </tr>
        <tr>
            
            <th>column2a</th>
            <th>column2b</th>
           
        </tr>
        <tr>
            
            <th rowspan="2">row1</th>
            <th>row1a</th>
            <td>123</td>
            <td>456</td>
            <td>789</td>
           
        </tr>
        <tr>
            
            
            <th>row1b</th>
            <td>123</td>
            <td>456</td>
            <td>789</td>
           
        </tr>
        <tr>
            
            
            <th colspan="2">row2</th>
            <td>123</td>
            <td>456</td>
            <td>789</td>
           
        </tr>
    </table>
</body>
</html>
